name: "CodeQL Security Scan"

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
        description: "Language to scan: javascript, python, java, etc."

jobs:
  codeql-analysis:
    name: "CodeQL SAST (${{ inputs.language }})"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write  # Needed to upload results to GitHub Security tab

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4       # Upgraded from v3
        with:
          languages: ${{ inputs.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ inputs.language }}"
          # upload:false for private repos (requires paid GitHub Advanced Security)
          # upload:true for public repos
          upload: ${{ github.event.repository.visibility == 'public' && 'true' || 'failure-only' }}
