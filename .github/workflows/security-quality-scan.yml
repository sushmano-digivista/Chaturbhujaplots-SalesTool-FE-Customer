name: "Security & Quality Scan - Customer Frontend"

on:
  push:
    branches:
      - Development
  pull_request:
    branches:
      - Development
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Permissions granted to all called reusable workflows
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # ── Job 1: CodeQL SAST (free GitHub security scanner) ──
  codeql:
    name: "CodeQL SAST"
    uses: ./.github/workflows/codeql-scan.yml
    with:
      language: javascript

  # ── Job 2: Trivy Dependency & Container Scan ──
  trivy:
    name: "Trivy Vulnerability Scan"
    uses: ./.github/workflows/trivy-scan.yml

  # ── Job 3: SonarCloud Quality Gate ──
  sonarcloud:
    name: "SonarCloud Quality"
    uses: ./.github/workflows/sonarqube-scan.yml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Job 4: Summary — blocks merge if critical scans fail ──
  scan-summary:
    name: "Scan Summary"
    needs: [codeql, trivy, sonarcloud]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report Results
        run: |
          echo "## 🔐 Security & Quality Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan                  | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 CodeQL SAST        | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Trivy Scan         | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ SonarCloud Quality  | ${{ needs.sonarcloud.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if Critical Scans Failed
        if: needs.codeql.result == 'failure' || needs.sonarcloud.result == 'failure'
        run: |
          echo "One or more security/quality scans failed. Blocking merge."
          exit 1
