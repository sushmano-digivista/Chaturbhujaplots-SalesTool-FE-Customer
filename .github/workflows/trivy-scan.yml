name: "Trivy Vulnerability Scan"

on:
  workflow_call:

jobs:
  trivy-scan:
    name: "Trivy Dependency & FS Scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # Upload SARIF to GitHub Security tab

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Filesystem scan: source code + dependencies ──
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-fs-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"           # Don't fail pipeline — report only
          ignore-unfixed: true     # Skip CVEs with no available fix

      - name: Upload Trivy FS Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: "trivy-filesystem"

      # ── Dockerfile scan (only runs if Dockerfile exists) ──
      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Trivy Dockerfile Scan
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "Dockerfile"
          format: "sarif"
          output: "trivy-docker-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy Dockerfile Results to GitHub Security
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-docker-results.sarif"
          category: "trivy-dockerfile"
