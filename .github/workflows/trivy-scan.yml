name: "Trivy Vulnerability Scan"

on:
  workflow_call:

jobs:
  trivy-scan:
    name: "Trivy Dependency & FS Scan"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          [ -f "Dockerfile" ] && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT

      - name: Trivy Dockerfile Config Scan
        if: steps.check_dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "Dockerfile"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Trivy Step Summary
        if: always()
        run: |
          echo "## Trivy Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "Scan completed. Check logs above for CRITICAL/HIGH findings." >> $GITHUB_STEP_SUMMARY
