<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1E4D2B" />
    <title>Chaturbhuja Properties & Infra</title>
    <meta name="description" content="CRDA & RERA approved premium residential plots near Amaravati, AP." />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Loading splash — replaced by React on load -->
      <div id="splash" style="
        position:fixed;inset:0;
        background:#F5F0E8;
        display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        z-index:9999;
      ">
        <img
          src="/chaturbhuja-logo.webp"
          alt="Chaturbhuja Properties & Infra"
          style="width:220px;max-width:70vw;object-fit:contain;margin-bottom:24px;"
        />
        <div style="
          width:40px;height:40px;
          border:3px solid rgba(30,77,43,0.15);
          border-top-color:#1E4D2B;
          border-radius:50%;
          animation:spin 0.8s linear infinite;
        "></div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script>
      // Remove splash once React mounts
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root')
          var splash = document.getElementById('splash')
          if (root && splash && root.children.length > 1) {
            splash.style.opacity = '0'
            splash.style.transition = 'opacity 0.3s'
            setTimeout(function(){ splash.remove() }, 300)
            observer.disconnect()
          }
        })
        observer.observe(document.getElementById('root'), { childList: true, subtree: true })
      })
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
