<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1E4D2B" />
    <title>Chaturbhuja Properties & Infra</title>
    <meta name="description" content="CRDA & RERA approved premium residential plots near Amaravati, AP." />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Loading splash — replaced by React on load -->
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        #splash {
          position: fixed; inset: 0;
          background: radial-gradient(ellipse at center, #0f2d1a 0%, #081a0f 100%);
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          z-index: 9999; gap: 0;
        }
        #splash-logo {
          width: 320px; max-width: 82vw;
          object-fit: contain;
          animation: logoPulse 2s ease-in-out infinite;
          filter: brightness(1.6) drop-shadow(0 0 32px rgba(201,168,76,0.55))
                  drop-shadow(0 0 8px rgba(201,168,76,0.3));
        }
        /* ── House draw animation ── */
        #splash-house {
          margin-top: 24px;
          opacity: 0.92;
        }
        .house-path {
          fill: none;
          stroke: #C9A84C;
          stroke-linecap: round;
          stroke-linejoin: round;
        }
        /* Roof: perimeter ~137 */
        #h-roof {
          stroke-width: 3.5;
          stroke-dasharray: 140;
          stroke-dashoffset: 140;
          animation: draw 0.9s ease forwards 0.1s;
        }
        /* Walls: perimeter ~220 */
        #h-walls {
          stroke-width: 3.5;
          stroke-dasharray: 225;
          stroke-dashoffset: 225;
          animation: draw 1s ease forwards 0.85s;
        }
        /* Door: perimeter ~88 */
        #h-door {
          stroke-width: 2.5;
          stroke-dasharray: 90;
          stroke-dashoffset: 90;
          animation: draw 0.65s ease forwards 1.65s;
        }
        /* Window left: perimeter ~60 */
        #h-winL {
          stroke-width: 2;
          stroke-dasharray: 62;
          stroke-dashoffset: 62;
          animation: draw 0.5s ease forwards 2.1s;
        }
        /* Window right: perimeter ~60 */
        #h-winR {
          stroke-width: 2;
          stroke-dasharray: 62;
          stroke-dashoffset: 62;
          animation: draw 0.5s ease forwards 2.35s;
        }
        /* Chimney */
        #h-chimney {
          stroke-width: 3;
          stroke-dasharray: 60;
          stroke-dashoffset: 60;
          animation: draw 0.4s ease forwards 2.6s;
        }
        /* Shimmer bar */
        #splash-bar {
          margin-top: 28px;
          width: 180px; height: 2px;
          background: rgba(255,255,255,0.07);
          border-radius: 2px; overflow: hidden;
        }
        #splash-bar-fill {
          height: 100%;
          background: linear-gradient(90deg, transparent, #C9A84C, #e8cf7a, #C9A84C, transparent);
          background-size: 300% 100%;
          animation: shimmer 1.6s ease-in-out infinite;
          border-radius: 2px;
        }
        @keyframes draw {
          to { stroke-dashoffset: 0; }
        }
        @keyframes logoPulse {
          0%, 100% { transform: scale(1);    filter: brightness(1.6) drop-shadow(0 0 32px rgba(201,168,76,0.55)) drop-shadow(0 0 8px rgba(201,168,76,0.3)); }
          50%       { transform: scale(1.03); filter: brightness(1.8) drop-shadow(0 0 48px rgba(201,168,76,0.75)) drop-shadow(0 0 12px rgba(201,168,76,0.5)); }
        }
        @keyframes shimmer {
          0%   { background-position: 200% 0; width: 0%;   }
          50%  { background-position:   0% 0; width: 100%; }
          100% { background-position:-200% 0; width: 100%; }
        }
        #splash.hide { animation: splashOut 0.45s ease forwards; }
        @keyframes splashOut { to { opacity: 0; transform: scale(1.02); } }
      </style>
      <div id="splash">
        <img id="splash-logo" src="/chaturbhuja-logo.webp" alt="Chaturbhuja Properties & Infra" />

        <!-- Animated house SVG — draws itself while page loads -->
        <svg id="splash-house" viewBox="0 0 110 95" width="90" height="78" xmlns="http://www.w3.org/2000/svg">
          <!-- Chimney -->
          <polyline id="h-chimney" class="house-path"
            points="68,12 68,2 78,2 78,18" />
          <!-- Roof -->
          <polyline id="h-roof" class="house-path"
            points="5,48 55,8 105,48" />
          <!-- Walls -->
          <rect id="h-walls" class="house-path"
            x="15" y="48" width="80" height="42" />
          <!-- Door -->
          <rect id="h-door" class="house-path"
            x="43" y="68" width="24" height="22" rx="1" />
          <!-- Window left -->
          <rect id="h-winL" class="house-path"
            x="21" y="55" width="18" height="16" rx="1" />
          <!-- Window right -->
          <rect id="h-winR" class="house-path"
            x="71" y="55" width="18" height="16" rx="1" />
        </svg>

        <div id="splash-bar"><div id="splash-bar-fill"></div></div>
      </div>
    </div>
    </div>
    <script>
      // Remove splash once React mounts
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root')
          var splash = document.getElementById('splash')
          if (root && splash && root.children.length > 1) {
            splash.style.opacity = '0'
            splash.style.transition = 'opacity 0.3s'
            setTimeout(function(){ splash.remove() }, 300)
            observer.disconnect()
          }
        })
        observer.observe(document.getElementById('root'), { childList: true, subtree: true })
      })
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
