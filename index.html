<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1E4D2B" />
    <title>Chaturbhuja Properties & Infra</title>
    <meta name="description" content="CRDA & RERA approved premium residential plots near Amaravati, AP." />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Loading splash — replaced by React on load -->
      <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        #splash {
          position:fixed; inset:0;
          background:radial-gradient(ellipse at center,#0f2d1a 0%,#081a0f 100%);
          display:flex; flex-direction:column;
          align-items:center; justify-content:center;
          z-index:9999;
        }
        #splash-house { display:block; margin-bottom:-6px; }
        #splash-logo {
          width:320px; max-width:82vw; object-fit:contain;
          animation:logoPulse 2s ease-in-out infinite;
          filter:brightness(1.7) drop-shadow(0 0 36px rgba(201,168,76,.6))
                 drop-shadow(0 0 10px rgba(201,168,76,.35));
        }
        #splash-bar {
          margin-top:22px; width:180px; height:2px;
          background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden;
        }
        #splash-bar-fill {
          height:100%;
          background:linear-gradient(90deg,transparent,#C9A84C,#e8cf7a,#C9A84C,transparent);
          background-size:300% 100%;
          animation:shimmer 1.6s ease-in-out infinite;
          border-radius:2px;
        }
        /* House strokes — draw once, stay drawn (forwards), all done by 2.6s */
        .hp { fill:none; stroke:#C9A84C; stroke-linecap:round; stroke-linejoin:round; }
        #h-chimney { stroke-width:3;   stroke-dasharray:60;  stroke-dashoffset:60;  animation:draw 0.35s ease         0.00s forwards; }
        #h-roof    { stroke-width:3.5; stroke-dasharray:140; stroke-dashoffset:140; animation:draw 0.70s ease         0.30s forwards; }
        #h-walls   { stroke-width:3.5; stroke-dasharray:225; stroke-dashoffset:225; animation:draw 0.80s ease         0.90s forwards; }
        #h-door    { stroke-width:2.5; stroke-dasharray:90;  stroke-dashoffset:90;  animation:draw 0.50s ease         1.60s forwards; }
        #h-winL    { stroke-width:2;   stroke-dasharray:62;  stroke-dashoffset:62;  animation:draw 0.40s ease         2.00s forwards; }
        #h-winR    { stroke-width:2;   stroke-dasharray:62;  stroke-dashoffset:62;  animation:draw 0.40s ease         2.20s forwards; }
        @keyframes draw       { to { stroke-dashoffset:0; } }
        @keyframes logoPulse  {
          0%,100%{ transform:scale(1);    filter:brightness(1.7) drop-shadow(0 0 36px rgba(201,168,76,.6))  drop-shadow(0 0 10px rgba(201,168,76,.35)); }
          50%    { transform:scale(1.03); filter:brightness(1.9) drop-shadow(0 0 52px rgba(201,168,76,.80)) drop-shadow(0 0 14px rgba(201,168,76,.50)); }
        }
        @keyframes shimmer {
          0%   { background-position:200% 0; width:0%;   }
          50%  { background-position:  0% 0; width:100%; }
          100% { background-position:-200% 0; width:100%; }
        }
        #splash.hide { animation:splashOut 0.45s ease forwards; }
        @keyframes splashOut { to { opacity:0; transform:scale(1.02); } }
      </style>
      <div id="splash">
        <svg id="splash-house" viewBox="0 0 110 95" width="100" height="86" xmlns="http://www.w3.org/2000/svg">
          <polyline id="h-chimney" class="hp" points="68,12 68,2 78,2 78,18" />
          <polyline id="h-roof"    class="hp" points="5,48 55,8 105,48" />
          <rect     id="h-walls"  class="hp" x="15" y="48" width="80" height="42" />
          <rect     id="h-door"   class="hp" x="43" y="68" width="24" height="22" rx="1" />
          <rect     id="h-winL"   class="hp" x="21" y="55" width="18" height="16" rx="1" />
          <rect     id="h-winR"   class="hp" x="71" y="55" width="18" height="16" rx="1" />
        </svg>
        <img id="splash-logo" src="/chaturbhuja-logo.webp" alt="Chaturbhuja Properties & Infra" />
        <div id="splash-bar"><div id="splash-bar-fill"></div></div>
      </div>
    </div>
    </div>
    </div>
    </div>
    <script>
      var splashShownAt = Date.now()
      var MIN_SPLASH_MS = 3000
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          var root   = document.getElementById('root')
          var splash = document.getElementById('splash')
          if (root && splash && root.children.length > 1) {
            observer.disconnect()
            var elapsed = Date.now() - splashShownAt
            var wait    = Math.max(0, MIN_SPLASH_MS - elapsed)
            setTimeout(function() {
              splash.style.opacity   = '0'
              splash.style.transition = 'opacity 0.45s'
              setTimeout(function(){ splash.remove() }, 450)
            }, wait)
          }
        })
        observer.observe(document.getElementById('root'), { childList:true, subtree:true })
      })
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
