<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1E4D2B" />
    <title>Chaturbhuja Properties & Infra</title>
    <meta name="description" content="CRDA & RERA approved premium residential plots near Amaravati, AP." />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- Loading splash — replaced by React on load -->
      <style>
        #splash {
          position: fixed; inset: 0;
          background: #0b2415;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          z-index: 9999;
        }
        #splash-logo {
          width: 260px; max-width: 75vw;
          object-fit: contain;
          animation: splashPulse 1.8s ease-in-out infinite;
          filter: drop-shadow(0 0 24px rgba(201,168,76,0.4));
        }
        #splash-tagline {
          margin-top: 20px;
          font-family: Georgia, serif;
          font-size: 13px;
          letter-spacing: 0.25em;
          text-transform: uppercase;
          color: rgba(201,168,76,0.8);
          animation: splashFadeIn 1.2s ease forwards;
          opacity: 0;
        }
        #splash-bar {
          margin-top: 32px;
          width: 160px;
          height: 2px;
          background: rgba(255,255,255,0.08);
          border-radius: 2px;
          overflow: hidden;
        }
        #splash-bar-fill {
          height: 100%;
          background: linear-gradient(90deg, #C9A84C, #e2bf64, #C9A84C);
          background-size: 200% 100%;
          animation: splashShimmer 1.4s ease-in-out infinite;
          border-radius: 2px;
        }
        @keyframes splashPulse {
          0%, 100% { transform: scale(1);   opacity: 1; }
          50%       { transform: scale(1.04); opacity: 0.88; }
        }
        @keyframes splashFadeIn {
          to { opacity: 1; }
        }
        @keyframes splashShimmer {
          0%   { background-position: 200% 0; width: 0%; }
          50%  { background-position: 0% 0;   width: 100%; }
          100% { background-position: -200% 0; width: 100%; }
        }
        #splash.hide {
          animation: splashOut 0.5s ease forwards;
        }
        @keyframes splashOut {
          to { opacity: 0; transform: scale(1.02); }
        }
      </style>
      <div id="splash">
        <img
          id="splash-logo"
          src="/chaturbhuja-logo.webp"
          alt="Chaturbhuja Properties & Infra"
        />
        <div id="splash-tagline">Properties &amp; Infra</div>
        <div id="splash-bar"><div id="splash-bar-fill"></div></div>
      </div>
    </div>
    <script>
      // Remove splash once React mounts
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root')
          var splash = document.getElementById('splash')
          if (root && splash && root.children.length > 1) {
            splash.style.opacity = '0'
            splash.style.transition = 'opacity 0.3s'
            setTimeout(function(){ splash.remove() }, 300)
            observer.disconnect()
          }
        })
        observer.observe(document.getElementById('root'), { childList: true, subtree: true })
      })
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
