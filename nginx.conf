server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/dashboard/ {
        proxy_pass https://chaturbhujaplots-salestool-be-dasboardservices-production.up.railway.app/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host chaturbhujaplots-salestool-be-dasboardservices-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 30s;
    }

    location /api/plots/ {
        proxy_pass https://chaturbhujaplots-salestool-be-plotuploadservices-production.up.railway.app/api/v1/plots/;
        proxy_http_version 1.1;
        proxy_set_header Host chaturbhujaplots-salestool-be-plotuploadservices-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 30s;
    }

    location /api/media/ {
        proxy_pass https://chaturbhujaplots-salestool-be-commonservices-production.up.railway.app/api/v1/media/;
        proxy_http_version 1.1;
        proxy_set_header Host chaturbhujaplots-salestool-be-commonservices-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
        client_max_body_size 100M;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
