# SonarCloud configuration - Chaturbhujaplots SalesTool - Customer Frontend
sonar.projectKey=sushmano-digivista_Chaturbhujaplots-SalesTool-FE-Customer
sonar.organization=sushmano-digivista

sonar.projectName=Chaturbhujaplots SalesTool - Customer Frontend
sonar.projectVersion=1.0

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/__tests__/**,**/*.test.*,**/*.spec.*,**/coverage/**,src/assets/**,**/*.jsx,src/main.jsx,src/App.jsx

sonar.tests=src
sonar.test.inclusions=**/*.test.jsx,**/*.test.js,**/*.spec.jsx,**/*.spec.js

# Coverage only reported for pure JS logic files (utils, constants, api, hooks)
# JSX components are excluded from coverage — they require E2E / visual testing
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.jsx,src/main.jsx,src/App.jsx,src/constants/projectGalleries.js,src/constants/fallbackContent.js,src/constants/projects.js,src/assets/**

sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=false
