# SonarQube configuration for Customer Frontend (React + Vite)
sonar.projectKey=chaturbhujaplots-salestool-fe-customer
sonar.projectName=Chaturbhujaplots SalesTool - Customer Frontend
sonar.projectVersion=1.0

# Source settings
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/__tests__/**,**/*.test.*,**/*.spec.*,**/coverage/**

# Test settings
sonar.tests=src
sonar.test.inclusions=**/*.test.jsx,**/*.test.js,**/*.spec.jsx,**/*.spec.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true
